{% extends 'base.html' %}

{% block title %}Access Denied - CSRF Error{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-800">
    <div class="max-w-md w-full px-6 py-8 bg-white dark:bg-slate-700 shadow-lg rounded-lg">
        <div class="text-center">
            <h1 class="text-9xl font-bold text-gray-800 dark:text-white">403</h1>
            <h2 class="mt-4 text-3xl font-semibold text-gray-600 dark:text-gray-300">CSRF Verification Failed</h2>
            <p class="mt-4 text-gray-500 dark:text-gray-400">Security verification failed. Please try refreshing the page.</p>
            <a href="{% url 'home' %}" class="mt-6 inline-block px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition duration-300">
                Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
